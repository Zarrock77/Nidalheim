name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-site:
    name: Build & Push site image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes in /site
        id: changes
        run: |
          if git diff --quiet HEAD^ HEAD site/; then
            echo "site_changed=false" >> $GITHUB_OUTPUT
          else
            echo "site_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes in /site
        if: steps.changes.outputs.site_changed == 'false'
        run: echo "🟢 No changes detected in /site — skipping build."

      - name: Set up Docker Buildx
        if: steps.changes.outputs.site_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changes.outputs.site_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push site image with cache
        if: steps.changes.outputs.site_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./site
          file: ./site/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/site:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/site:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/site:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/site:cache,mode=max

  build-docs:
    name: Build & Push docs image
    runs-on: ubuntu-latest
    needs: build-site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes in /docs
        id: changes
        run: |
          if git diff --quiet HEAD^ HEAD docs/; then
            echo "docs_changed=false" >> $GITHUB_OUTPUT
          else
            echo "docs_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes in /docs
        if: steps.changes.outputs.docs_changed == 'false'
        run: echo "🟢 No changes detected in /docs — skipping build."

      - name: Set up Docker Buildx
        if: steps.changes.outputs.docs_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changes.outputs.docs_changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push docs image with cache
        if: steps.changes.outputs.docs_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./docs
          file: ./docs/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/docs:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/docs:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/docs:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/docs:cache,mode=max
