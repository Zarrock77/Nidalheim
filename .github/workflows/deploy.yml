name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/zarrock77/nidalheim

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: site
            context: ./services/site
          - service: docs
            context: ./services/docs
          - service: api-auth
            context: ./services/api-auth
          - service: api-game
            context: ./services/api-game
          - service: db-migrate
            context: ./services/db
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            eval $(ssh-agent -s)
            ssh-add ~/.ssh/system
            cd ./Nidalheim

            git pull

            cat > infra/.env << ENVEOF
            IMAGE_TAG=${{ github.sha }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}
            LLM_API_KEY=${{ secrets.LLM_API_KEY }}
            LLM_BASE_URL=https://api.groq.com/openai/v1
            LLM_MODEL=llama-3.1-8b-instant
            TTS_PROVIDER=cartesia
            CARTESIA_API_KEY=${{ secrets.CARTESIA_API_KEY }}
            CARTESIA_VOICE_ID=${{ secrets.CARTESIA_VOICE_ID }}
            ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
            ELEVENLABS_VOICE_ID=${{ secrets.ELEVENLABS_VOICE_ID }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENVEOF

            cd infra
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose restart nginx
            docker compose run --rm db-migrate
            docker image prune -f
