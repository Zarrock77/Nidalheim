services:
  nidalheim-site:
    image: zarrockdle/site:latest
    container_name: nidalheim-site
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - nidalheim-network

  nidalheim-docs:
    image: zarrockdle/docs:latest
    container_name: nidalheim-docs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - nidalheim-network

  nidalheim-api:
    image: zarrockdle/api:latest
    container_name: nidalheim-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NIDALHEIM_API_KEY=${NIDALHEIM_API_KEY}
      - PORT=3002
    networks:
      - nidalheim-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nidalheim-network
    depends_on:
      - nidalheim-site
      - nidalheim-docs
      - nidalheim-api

networks:
  nidalheim-network:
    driver: bridge
