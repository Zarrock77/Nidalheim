services:
  nidalheim-site:
    image: ghcr.io/zarrock77/nidalheim-site:${IMAGE_TAG:-latest}
    build:
      context: ../services/site
      dockerfile: Dockerfile
    container_name: nidalheim-site
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_AUTH_URL=http://nidalheim-api-auth:3001
    networks:
      - nidalheim-network

  nidalheim-docs:
    image: ghcr.io/zarrock77/nidalheim-docs:${IMAGE_TAG:-latest}
    build:
      context: ../services/docs
      dockerfile: Dockerfile
    container_name: nidalheim-docs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_API_URL=http://nidalheim-api-auth:3001
      - AUTH_URL=https://docs.nidalheim.com
      - AUTH_TRUST_HOST=true
    networks:
      - nidalheim-network

  api-auth:
    image: ghcr.io/zarrock77/nidalheim-api-auth:${IMAGE_TAG:-latest}
    build:
      context: ../services/api-auth
      dockerfile: Dockerfile
    container_name: nidalheim-api-auth
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRY=15m
      - JWT_REFRESH_TOKEN_EXPIRY=7d
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DEVICE_VERIFICATION_BASE_URL=https://www.nidalheim.com
      - CORS_ORIGINS=https://www.nidalheim.com,https://docs.nidalheim.com
    depends_on:
      - redis
      - postgres
    networks:
      - nidalheim-network

  api-game:
    image: ghcr.io/zarrock77/nidalheim-api-game:${IMAGE_TAG:-latest}
    build:
      context: ../services/api-game
      dockerfile: Dockerfile
    container_name: nidalheim-api-game
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-llama-3.1-8b-instant}
      - TTS_PROVIDER=${TTS_PROVIDER:-cartesia}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - CARTESIA_VOICE_ID=${CARTESIA_VOICE_ID}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
    depends_on:
      - postgres
    networks:
      - nidalheim-network

  postgres:
    image: postgres:16-alpine
    container_name: nidalheim-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nidalheim}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-nidalheim}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nidalheim-network

  db-migrate:
    image: ghcr.io/zarrock77/nidalheim-db-migrate:${IMAGE_TAG:-latest}
    build:
      context: ../services/db
      dockerfile: Dockerfile
    container_name: nidalheim-db-migrate
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
    networks:
      - nidalheim-network
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: nidalheim-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nidalheim-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - nidalheim-network
    depends_on:
      - nidalheim-site
      - nidalheim-docs
      - api-auth
      - api-game
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres-data:
  redis-data:

networks:
  nidalheim-network:
    driver: bridge
