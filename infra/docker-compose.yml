services:
  nidalheim-site:
    build:
      context: ../web/site
      dockerfile: Dockerfile
    container_name: nidalheim-site
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - nidalheim-network

  nidalheim-docs:
    build:
      context: ../web/docs
      dockerfile: Dockerfile
    container_name: nidalheim-docs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - nidalheim-network

  api-auth:
    build:
      context: ../services/api-auth
      dockerfile: Dockerfile
    container_name: nidalheim-api-auth
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_PRIVATE_KEY_PATH=/run/secrets/jwt_private_key
      - JWT_PUBLIC_KEY_PATH=/run/secrets/jwt_public_key
      - JWT_ACCESS_TOKEN_EXPIRY=15m
      - JWT_REFRESH_TOKEN_EXPIRY=7d
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      - redis
      - postgres
    networks:
      - nidalheim-network

  api-game:
    build:
      context: ../services/api-game
      dockerfile: Dockerfile
    container_name: nidalheim-api-game
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NIDALHEIM_API_KEY=${NIDALHEIM_API_KEY}
    networks:
      - nidalheim-network

  postgres:
    image: postgres:16-alpine
    container_name: nidalheim-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nidalheim}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-nidalheim}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nidalheim-network

  db-migrate:
    build:
      context: ../services/db
      dockerfile: Dockerfile
    container_name: nidalheim-db-migrate
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - postgres
    networks:
      - nidalheim-network
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: nidalheim-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - nidalheim-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nidalheim-network
    depends_on:
      - nidalheim-site
      - nidalheim-docs
      - api-auth
      - api-game

secrets:
  jwt_private_key:
    file: ../services/api-auth/keys/private.pem
  jwt_public_key:
    file: ../services/api-auth/keys/public.pem

volumes:
  postgres-data:
  redis-data:

networks:
  nidalheim-network:
    driver: bridge
