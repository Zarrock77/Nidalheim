services:
  nidalheim-site:
    image: zarrockdle/site:latest
    container_name: nidalheim-site
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - nidalheim-network

  nidalheim-docs:
    image: zarrockdle/docs:latest
    container_name: nidalheim-docs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - nidalheim-network

  api-auth:
    image: zarrockdle/api-auth:latest
    container_name: nidalheim-api-auth
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_PRIVATE_KEY_PATH=/run/secrets/jwt_private_key
      - JWT_PUBLIC_KEY_PATH=/run/secrets/jwt_public_key
      - JWT_ACCESS_TOKEN_EXPIRY=15m
      - JWT_REFRESH_TOKEN_EXPIRY=7d
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL}
    secrets:
      - jwt_private_key
      - jwt_public_key
    depends_on:
      - redis
    networks:
      - nidalheim-network

  api-game:
    image: zarrockdle/api-game:latest
    container_name: nidalheim-api-game
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NIDALHEIM_API_KEY=${NIDALHEIM_API_KEY}
    networks:
      - nidalheim-network

  redis:
    image: redis:7-alpine
    container_name: nidalheim-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - nidalheim-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nidalheim-network
    depends_on:
      - nidalheim-site
      - nidalheim-docs
      - api-auth
      - api-game

secrets:
  jwt_private_key:
    file: ../services/api-auth/keys/private.pem
  jwt_public_key:
    file: ../services/api-auth/keys/public.pem

volumes:
  redis-data:

networks:
  nidalheim-network:
    driver: bridge
