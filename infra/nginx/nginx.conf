user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout  65;

    # Redirect nidalheim.com -> www.nidalheim.com
    server {
        listen 80;
        server_name nidalheim.com;
        return 301 http://www.nidalheim.com$request_uri;
    }

    # Site principal (Next.js)
    server {
        listen 80;
        server_name www.nidalheim.com;

        location / {
            proxy_pass http://nidalheim-site:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Documentation
    server {
        listen 80;
        server_name docs.nidalheim.com;

        location / {
            proxy_pass http://nidalheim-docs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Auth API (REST)
    server {
        listen 80;
        server_name api-auth.nidalheim.com;

        location / {
            proxy_pass http://nidalheim-api-auth:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Game API (WebSocket + REST)
    server {
        listen 80;
        server_name api-game.nidalheim.com;

        location / {
            proxy_pass http://nidalheim-api-game:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            client_max_body_size 0;
        }
    }
}
