user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout  65;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Redirect nidalheim.com -> www.nidalheim.com
    server {
        listen 80;
        server_name nidalheim.com;
        return 301 http://www.nidalheim.com$request_uri;
    }

    # Site principal (Next.js)
    server {
        listen 80;
        server_name www.nidalheim.com;

        location / {
            proxy_pass http://nidalheim-site:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Documentation
    server {
        listen 80;
        server_name docs.nidalheim.com;

        location / {
            proxy_pass http://nidalheim-docs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Auth API (REST)
    server {
        listen 80;
        server_name api-auth.nidalheim.com;

        location / {
            proxy_pass http://nidalheim-api-auth:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Game API HTTP -> ACME challenge + redirect HTTPS
    server {
        listen 80;
        server_name api-game.nidalheim.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Game API (WebSocket + REST) en HTTPS direct
    server {
        listen 443 ssl;
        http2 on;
        server_name api-game.nidalheim.com;

        ssl_certificate /etc/letsencrypt/live/api-game.nidalheim.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-game.nidalheim.com/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://nidalheim-api-game:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            client_max_body_size 0;
        }
    }

    # ============================================================
    # STAGING — process host (hot-reload), accessibles via host.docker.internal
    # CF proxied (TLS edge) : www-staging, docs-staging, api-auth-staging
    # CF DNS-only + LE direct : api-game-staging (bypass cap WS 100s — iso prod)
    # Ports host : api-auth=3011 / api-game=3012 / site=3013 / docs=3014
    # ============================================================

    # Site staging (Next.js dev)
    server {
        listen 80;
        server_name www-staging.nidalheim.com;

        location / {
            proxy_pass http://host.docker.internal:3013;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Docs staging (Nextra dev)
    server {
        listen 80;
        server_name docs-staging.nidalheim.com;

        location / {
            proxy_pass http://host.docker.internal:3014;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Auth API staging
    server {
        listen 80;
        server_name api-auth-staging.nidalheim.com;

        location / {
            proxy_pass http://host.docker.internal:3011;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Game API staging HTTP -> ACME challenge + redirect HTTPS
    server {
        listen 80;
        server_name api-game-staging.nidalheim.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Game API staging (WebSocket) — TLS direct VPS via Let's Encrypt
    # DNS-only sur Cloudflare (bypass cap WS 100s, identique à api-game prod)
    server {
        listen 443 ssl;
        http2 on;
        server_name api-game-staging.nidalheim.com;

        ssl_certificate /etc/letsencrypt/live/api-game-staging.nidalheim.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api-game-staging.nidalheim.com/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://host.docker.internal:3012;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            client_max_body_size 0;
        }
    }
}
